  <text x="427" y="119" fill="white" font-size="8">COPY requirements.txt .</text>
  <rect x="420" y="127" width="155" height="17" rx="2" fill="#50c070" opacity="0.75"/>
  <text x="427" y="139" fill="#333" font-size="8">RUN pip install -r req…</text>
  <rect x="420" y="147" width="155" height="17" rx="2" fill="#60c878" opacity="0.7"/>
  <text x="427" y="159" fill="#333" font-size="8">COPY . .</text>
  <rect x="420" y="167" width="155" height="17" rx="2" fill="#70d080" opacity="0.7"/>
  <text x="427" y="179" fill="#333" font-size="8">CMD ["uvicorn", "main:app"]</text>
  <text x="499" y="205" text-anchor="middle" fill="#555" font-size="9">Image: 180MB compressed</text>
  <rect x="420" y="215" width="155" height="35" rx="5" fill="white" stroke="#209040" stroke-width="1.5"/>
