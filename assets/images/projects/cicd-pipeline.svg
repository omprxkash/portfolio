<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="50%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect width="800" height="400" fill="url(#grid)"/>
  <!-- Pipeline header -->
  <text x="400" y="82" text-anchor="middle" font-family="monospace" font-size="13" fill="rgba(255,255,255,0.35)" letter-spacing="2">CI / CD PIPELINE</text>
  <!-- Stage 1: Source -->
  <rect x="45" y="110" width="120" height="160" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <text x="105" y="145" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.5)" letter-spacing="1">SOURCE</text>
  <rect x="65" y="155" width="80" height="7" rx="3" fill="rgba(96,165,250,0.3)"/>
  <rect x="65" y="170" width="60" height="7" rx="3" fill="rgba(96,165,250,0.2)"/>
  <rect x="65" y="185" width="70" height="7" rx="3" fill="rgba(96,165,250,0.25)"/>
  <text x="105" y="218" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(96,165,250,0.7)">GitHub</text>
  <text x="105" y="233" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.3)">main branch</text>
  <!-- Arrow 1 -->
  <path d="M175 190 L200 190" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <polygon points="198,185 210,190 198,195" fill="rgba(255,255,255,0.3)"/>
  <!-- Stage 2: Build -->
  <rect x="215" y="110" width="120" height="160" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(251,191,36,0.3)" stroke-width="1.5"/>
  <text x="275" y="145" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(251,191,36,0.6)" letter-spacing="1">BUILD</text>
  <rect x="235" y="155" width="80" height="7" rx="3" fill="rgba(251,191,36,0.25)"/>
  <rect x="235" y="170" width="70" height="7" rx="3" fill="rgba(251,191,36,0.18)"/>
  <rect x="235" y="185" width="80" height="7" rx="3" fill="rgba(251,191,36,0.22)"/>
  <text x="275" y="218" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(251,191,36,0.7)">Docker</text>
  <text x="275" y="233" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.3)">✓ 2m 14s</text>
  <!-- Arrow 2 -->
  <path d="M345 190 L370 190" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <polygon points="368,185 380,190 368,195" fill="rgba(255,255,255,0.3)"/>
  <!-- Stage 3: Test -->
  <rect x="385" y="110" width="120" height="160" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(52,211,153,0.3)" stroke-width="1.5"/>
  <text x="445" y="145" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(52,211,153,0.6)" letter-spacing="1">TEST</text>
  <rect x="405" y="155" width="80" height="7" rx="3" fill="rgba(52,211,153,0.25)"/>
  <rect x="405" y="170" width="75" height="7" rx="3" fill="rgba(52,211,153,0.18)"/>
  <rect x="405" y="185" width="80" height="7" rx="3" fill="rgba(52,211,153,0.22)"/>
  <text x="445" y="218" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(52,211,153,0.7)">PyTest</text>
  <text x="445" y="233" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(52,211,153,0.5)">✓ 98/100</text>
  <!-- Arrow 3 -->
  <path d="M515 190 L540 190" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <polygon points="538,185 550,190 538,195" fill="rgba(255,255,255,0.3)"/>
  <!-- Stage 4: Deploy -->
  <rect x="555" y="110" width="120" height="160" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(96,165,250,0.35)" stroke-width="1.5"/>
  <text x="615" y="145" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(96,165,250,0.6)" letter-spacing="1">DEPLOY</text>
  <rect x="575" y="155" width="80" height="7" rx="3" fill="rgba(96,165,250,0.25)"/>
  <rect x="575" y="170" width="65" height="7" rx="3" fill="rgba(96,165,250,0.18)"/>
  <rect x="575" y="185" width="80" height="7" rx="3" fill="rgba(96,165,250,0.22)"/>
  <text x="615" y="218" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(96,165,250,0.7)">AWS ECS</text>
  <text x="615" y="233" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(96,165,250,0.5)">✓ Live</text>
  <!-- Arrow 4 -->
  <path d="M685 190 L710 190" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <polygon points="708,185 720,190 708,195" fill="rgba(255,255,255,0.3)"/>
  <!-- Stage 5: Monitor -->
  <rect x="725" y="145" width="60" height="90" rx="10" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.3)" stroke-width="1.5"/>
  <text x="755" y="185" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(52,211,153,0.6)">MON</text>
  <text x="755" y="200" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(52,211,153,0.4)">ITOR</text>
  <!-- GitHub Actions label -->
  <rect x="200" y="295" width="400" height="32" rx="6" fill="rgba(0,0,0,0.2)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="400" y="316" text-anchor="middle" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.35)">GitHub Actions  ·  Docker  ·  AWS  ·  Automated</text>
  <text x="400" y="372" text-anchor="middle" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.28)" letter-spacing="3">CI/CD PIPELINE — DEVOPS</text>
</svg>
