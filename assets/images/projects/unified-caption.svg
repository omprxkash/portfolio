<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Arial,sans-serif">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
  </defs>
  <rect width="800" height="400" fill="#f6f6f6"/>
  <rect x="0"   y="0" width="197" height="360" fill="#fff4e0"/>
  <rect x="201" y="0" width="197" height="360" fill="#e0f0ff"/>
  <rect x="401" y="0" width="197" height="360" fill="#e8fce8"/>
  <rect x="601" y="0" width="199" height="360" fill="#f5e8ff"/>
  <line x1="199" y1="0" x2="199" y2="360" stroke="#ddd" stroke-width="2"/>
  <line x1="399" y1="0" x2="399" y2="360" stroke="#ddd" stroke-width="2"/>
  <line x1="599" y1="0" x2="599" y2="360" stroke="#ddd" stroke-width="2"/>
  <rect x="7" y="7" width="184" height="30" rx="5" fill="#c08020"/>
  <text x="99" y="27" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Encoders</text>
  <rect x="207" y="7" width="184" height="30" rx="5" fill="#2060c0"/>
  <text x="299" y="27" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Cross-Attention Fusion</text>
  <rect x="407" y="7" width="184" height="30" rx="5" fill="#208060"/>
  <text x="499" y="27" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Decoder</text>
  <rect x="607" y="7" width="184" height="30" rx="5" fill="#8030b0"/>
  <text x="699" y="27" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Caption Output</text>
  <!-- Image encoder tower -->
  <text x="60" y="58" text-anchor="middle" fill="#c08020" font-size="10" font-weight="bold">Image Enc.</text>
  <rect x="30" y="65" width="18" height="88" rx="2" fill="#e09030" opacity="0.9"/>
  <rect x="52" y="72" width="18" height="81" rx="2" fill="#e09030" opacity="0.9"/>
  <rect x="74" y="80" width="18" height="73" rx="2" fill="#f0a040" opacity="0.9"/>
  <rect x="96" y="90" width="18" height="63" rx="2" fill="#f0b050" opacity="0.9"/>
  <!-- Text encoder tower -->
  <text x="60" y="185" text-anchor="middle" fill="#2060c0" font-size="10" font-weight="bold">Text Enc.</text>
  <rect x="30" y="192" width="18" height="75" rx="2" fill="#4070d0" opacity="0.9"/>
  <rect x="52" y="200" width="18" height="67" rx="2" fill="#4070d0" opacity="0.9"/>
  <rect x="74" y="209" width="18" height="58" rx="2" fill="#5080e0" opacity="0.85"/>
  <rect x="96" y="220" width="18" height="47" rx="2" fill="#6090e8" opacity="0.85"/>
  <text x="99" y="300" text-anchor="middle" fill="#888" font-size="10">ViT + BERT</text>
  <!-- Cross-attention blocks -->
  <rect x="216" y="60" width="170" height="45" rx="5" fill="white" stroke="#2060c0" stroke-width="2"/>
  <text x="301" y="80" text-anchor="middle" fill="#2060c0" font-size="11" font-weight="bold">Multi-Head Attn</text>
  <text x="301" y="96" text-anchor="middle" fill="#777" font-size="9">Q: image · K,V: text</text>
  <line x1="301" y1="108" x2="301" y2="133" stroke="#888" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="216" y="137" width="170" height="45" rx="5" fill="white" stroke="#aaa"/>
  <text x="301" y="157" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">Add &amp; Norm</text>
  <text x="301" y="172" text-anchor="middle" fill="#777" font-size="9">Layer normalization</text>
  <line x1="301" y1="185" x2="301" y2="210" stroke="#888" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="216" y="214" width="170" height="45" rx="5" fill="white" stroke="#aaa"/>
  <text x="301" y="234" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">Feed-Forward</text>
  <text x="301" y="249" text-anchor="middle" fill="#777" font-size="9">FFN · 6 layers</text>
  <!-- Decoder tower -->
  <text x="499" y="58" text-anchor="middle" fill="#208060" font-size="10" font-weight="bold">Transformer Decoder</text>
  <rect x="430" y="65" width="12" height="90" rx="2" fill="#30a070" opacity="0.9"/>
  <rect x="446" y="72" width="12" height="83" rx="2" fill="#30a070" opacity="0.9"/>
  <rect x="462" y="80" width="12" height="75" rx="2" fill="#40b080" opacity="0.85"/>
  <rect x="478" y="90" width="12" height="65" rx="2" fill="#40b080" opacity="0.85"/>
  <rect x="494" y="100" width="12" height="55" rx="2" fill="#50c090" opacity="0.85"/>
  <rect x="510" y="112" width="12" height="43" rx="2" fill="#60c898" opacity="0.85"/>
  <rect x="526" y="124" width="12" height="31" rx="2" fill="#70d0a0" opacity="0.85"/>
  <text x="499" y="182" text-anchor="middle" fill="#555" font-size="9">Autoregressive</text>
  <rect x="430" y="200" width="138" height="38" rx="5" fill="white" stroke="#208060" stroke-width="1.5"/>
  <text x="499" y="219" text-anchor="middle" fill="#208060" font-size="10" font-weight="bold">Softmax · Vocab</text>
  <text x="499" y="234" text-anchor="middle" fill="#777" font-size="9">30k tokens</text>
  <!-- Caption Output -->
  <text x="699" y="62" text-anchor="middle" fill="#8030b0" font-size="10" font-weight="bold">Generated Caption</text>
  <rect x="616" y="72" width="165" height="28" rx="4" fill="white" stroke="#8030b0" stroke-width="1.5"/>
  <text x="699" y="91" text-anchor="middle" fill="#333" font-size="9">"A soldier in uniform…"</text>
  <line x1="616" y1="115" x2="781" y2="115" stroke="#eee"/>
  <text x="699" y="135" text-anchor="middle" fill="#8030b0" font-size="10" font-weight="bold">BLEU-4 Score</text>
  <rect x="640" y="143" width="105" height="10" rx="3" fill="#eee"/>
  <rect x="640" y="143" width="88" height="10" rx="3" fill="#8030b0" opacity="0.7"/>
  <text x="699" y="170" text-anchor="middle" fill="#333" font-size="10">0.384</text>
  <text x="699" y="190" text-anchor="middle" fill="#8030b0" font-size="10" font-weight="bold">METEOR Score</text>
  <rect x="640" y="198" width="105" height="10" rx="3" fill="#eee"/>
  <rect x="640" y="198" width="72" height="10" rx="3" fill="#30a070" opacity="0.7"/>
  <text x="699" y="225" text-anchor="middle" fill="#333" font-size="10">0.298</text>
  <line x1="616" y1="240" x2="781" y2="240" stroke="#eee"/>
  <text x="699" y="260" text-anchor="middle" fill="#208060" font-size="10" font-weight="bold">CIDEr: 1.21</text>
  <line x1="189" y1="150" x2="213" y2="180" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <line x1="389" y1="160" x2="414" y2="115" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <line x1="589" y1="160" x2="614" y2="160" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <rect x="0" y="362" width="800" height="38" fill="#2d3748"/>
  <text x="400" y="386" text-anchor="middle" fill="#ccc" font-size="11">Unified Image Captioning  ·  PyTorch · ViT · BERT · Cross-Attention · MS-COCO</text>
</svg>
