<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#431407"/>
      <stop offset="50%" stop-color="#9a3412"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect width="800" height="400" fill="url(#grid)"/>
  <!-- Image input box -->
  <rect x="80" y="90" width="240" height="200" rx="8" fill="rgba(0,0,0,0.3)" stroke="rgba(251,146,60,0.3)" stroke-width="2"/>
  <!-- Image placeholder mountains -->
  <rect x="80" y="90" width="240" height="200" rx="8" fill="rgba(251,146,60,0.04)"/>
  <polygon points="100,270 180,150 260,270" fill="rgba(251,146,60,0.12)"/>
  <polygon points="160,270 230,180 320,270" fill="rgba(251,146,60,0.08)"/>
  <circle cx="260" cy="130" r="25" fill="rgba(251,146,60,0.15)"/>
  <text x="200" y="302" text-anchor="middle" font-family="monospace" font-size="11" fill="rgba(251,146,60,0.5)">IMAGE INPUT</text>
  <!-- Arrow -->
  <path d="M330 190 L380 190" stroke="rgba(251,146,60,0.7)" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="378,184 392,190 378,196" fill="rgba(251,146,60,0.7)"/>
  <!-- Model box -->
  <rect x="400" y="145" width="120" height="90" rx="10" fill="rgba(251,146,60,0.08)" stroke="rgba(251,146,60,0.35)" stroke-width="1.5"/>
  <text x="460" y="182" text-anchor="middle" font-family="monospace" font-size="12" fill="rgba(251,146,60,0.8)" font-weight="bold">VLM</text>
  <text x="460" y="200" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.35)">Multimodal</text>
  <text x="460" y="214" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.35)">Encoder</text>
  <!-- Arrow out -->
  <path d="M530 190 L575 190" stroke="rgba(251,146,60,0.7)" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="573,184 587,190 573,196" fill="rgba(251,146,60,0.7)"/>
  <!-- Caption output box -->
  <rect x="595" y="95" width="180" height="190" rx="8" fill="rgba(0,0,0,0.25)" stroke="rgba(251,146,60,0.25)" stroke-width="1.5"/>
  <!-- Speech bubble tail -->
  <polygon points="595,165 575,175 595,185" fill="rgba(0,0,0,0.25)"/>
  <text x="685" y="122" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(251,146,60,0.5)">CAPTION</text>
  <rect x="613" y="132" width="144" height="1" fill="rgba(251,146,60,0.15)"/>
  <text x="613" y="155" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.55)">"A mountain landscape</text>
  <text x="613" y="170" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.55)">with warm sunset</text>
  <text x="613" y="185" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.55)">hues casting long</text>
  <text x="613" y="200" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.55)">shadows across the</text>
  <text x="613" y="215" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.55)">rugged terrain..."</text>
  <!-- BLEU Score badge -->
  <rect x="613" y="230" width="100" height="36" rx="6" fill="rgba(251,146,60,0.08)" stroke="rgba(251,146,60,0.25)" stroke-width="1"/>
  <text x="663" y="244" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(251,146,60,0.5)">BLEU Score</text>
  <text x="663" y="260" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="rgba(251,146,60,0.9)">0.847</text>
  <text x="400" y="372" text-anchor="middle" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.28)" letter-spacing="3">UNIFIED CAPTION GENERATION</text>
</svg>
