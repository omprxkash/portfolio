<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#022c22"/>
      <stop offset="50%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect width="800" height="400" fill="url(#grid)"/>
  <!-- Panel background -->
  <rect x="80" y="55" width="640" height="280" rx="10" fill="rgba(0,0,0,0.2)" stroke="rgba(52,211,153,0.15)" stroke-width="1"/>
  <!-- ECG chart area -->
  <rect x="100" y="70" width="420" height="180" rx="6" fill="rgba(0,0,0,0.2)" stroke="rgba(52,211,153,0.1)" stroke-width="1"/>
  <!-- ECG grid lines -->
  <line x1="100" y1="120" x2="520" y2="120" stroke="rgba(52,211,153,0.08)" stroke-width="1"/>
  <line x1="100" y1="160" x2="520" y2="160" stroke="rgba(52,211,153,0.08)" stroke-width="1"/>
  <line x1="100" y1="200" x2="520" y2="200" stroke="rgba(52,211,153,0.08)" stroke-width="1"/>
  <line x1="205" y1="70" x2="205" y2="250" stroke="rgba(52,211,153,0.06)" stroke-width="1"/>
  <line x1="310" y1="70" x2="310" y2="250" stroke="rgba(52,211,153,0.06)" stroke-width="1"/>
  <line x1="415" y1="70" x2="415" y2="250" stroke="rgba(52,211,153,0.06)" stroke-width="1"/>
  <!-- ECG line -->
  <polyline points="100,160 130,160 140,160 145,100 150,220 155,160 185,160 195,160 200,140 205,180 210,160 240,160 250,160 255,100 260,220 265,160 295,160 305,160 310,140 315,180 320,160 350,160 360,160 365,100 370,220 375,160 405,160 415,160 420,140 425,180 430,160 460,160 470,160 475,100 480,220 485,160 520,160"
    fill="none" stroke="#34d399" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Glow on ECG -->
  <polyline points="100,160 130,160 140,160 145,100 150,220 155,160 185,160 195,160 200,140 205,180 210,160 240,160 250,160 255,100 260,220 265,160 295,160 305,160 310,140 315,180 320,160 350,160 360,160 365,100 370,220 375,160 405,160 415,160 420,140 425,180 430,160 460,160 470,160 475,100 480,220 485,160 520,160"
    fill="none" stroke="rgba(52,211,153,0.2)" stroke-width="8" stroke-linejoin="round"/>
  <!-- Heart icon (right panel) -->
  <path d="M640,130 C640,118 655,110 665,122 C675,110 690,118 690,130 C690,150 665,168 665,168 C665,168 640,150 640,130 Z"
    fill="rgba(52,211,153,0.12)" stroke="#34d399" stroke-width="2"/>
  <!-- Prediction results -->
  <rect x="545" y="178" width="160" height="60" rx="6" fill="rgba(52,211,153,0.07)" stroke="rgba(52,211,153,0.2)" stroke-width="1"/>
  <text x="625" y="200" text-anchor="middle" font-family="monospace" font-size="11" fill="rgba(52,211,153,0.6)">PREDICTION</text>
  <text x="625" y="222" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#34d399">LOW RISK</text>
  <!-- Metrics below -->
  <rect x="100" y="265" width="130" height="50" rx="6" fill="rgba(52,211,153,0.07)" stroke="rgba(52,211,153,0.15)" stroke-width="1"/>
  <text x="165" y="286" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.4)">Accuracy</text>
  <text x="165" y="305" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#34d399">94.2%</text>
  <rect x="250" y="265" width="130" height="50" rx="6" fill="rgba(52,211,153,0.07)" stroke="rgba(52,211,153,0.15)" stroke-width="1"/>
  <text x="315" y="286" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.4)">Precision</text>
  <text x="315" y="305" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#34d399">91.8%</text>
  <rect x="400" y="265" width="130" height="50" rx="6" fill="rgba(52,211,153,0.07)" stroke="rgba(52,211,153,0.15)" stroke-width="1"/>
  <text x="465" y="286" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.4)">F1 Score</text>
  <text x="465" y="305" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#34d399">93.5%</text>
  <text x="400" y="372" text-anchor="middle" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.28)" letter-spacing="3">DISEASE PREDICTION — HEART &amp; LIVER</text>
</svg>
