<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1445"/>
      <stop offset="50%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect width="800" height="400" fill="url(#grid)"/>
  <!-- Histopathology slide area -->
  <rect x="80" y="60" width="380" height="280" rx="8" fill="rgba(0,0,0,0.25)" stroke="rgba(96,165,250,0.2)" stroke-width="1.5"/>
  <!-- Hex cell grid (simplified as overlapping circles) -->
  <circle cx="150" cy="130" r="32" fill="rgba(147,197,253,0.08)" stroke="rgba(147,197,253,0.2)" stroke-width="1"/>
  <circle cx="210" cy="130" r="32" fill="rgba(147,197,253,0.06)" stroke="rgba(147,197,253,0.2)" stroke-width="1"/>
  <circle cx="270" cy="130" r="32" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
  <circle cx="330" cy="130" r="32" fill="rgba(147,197,253,0.08)" stroke="rgba(147,197,253,0.2)" stroke-width="1"/>
  <circle cx="390" cy="130" r="32" fill="rgba(147,197,253,0.06)" stroke="rgba(147,197,253,0.2)" stroke-width="1"/>
  <circle cx="180" cy="190" r="32" fill="rgba(147,197,253,0.06)" stroke="rgba(147,197,253,0.2)" stroke-width="1"/>
  <circle cx="240" cy="190" r="32" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.35)" stroke-width="1"/>
  <circle cx="300" cy="190" r="32" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.25)" stroke-width="1"/>
  <circle cx="360" cy="190" r="32" fill="rgba(147,197,253,0.08)" stroke="rgba(147,197,253,0.2)" stroke-width="1"/>
  <circle cx="150" cy="250" r="32" fill="rgba(147,197,253,0.08)" stroke="rgba(147,197,253,0.2)" stroke-width="1"/>
  <circle cx="210" cy="250" r="32" fill="rgba(147,197,253,0.06)" stroke="rgba(147,197,253,0.2)" stroke-width="1"/>
  <circle cx="270" cy="250" r="32" fill="rgba(147,197,253,0.08)" stroke="rgba(147,197,253,0.2)" stroke-width="1"/>
  <circle cx="330" cy="250" r="32" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <circle cx="390" cy="250" r="32" fill="rgba(147,197,253,0.06)" stroke="rgba(147,197,253,0.2)" stroke-width="1"/>
  <!-- Detection bounding box around malignant region -->
  <rect x="210" y="155" width="120" height="80" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="210" y="155" width="5" height="5" fill="#ef4444"/>
  <rect x="325" y="155" width="5" height="5" fill="#ef4444"/>
  <rect x="210" y="230" width="5" height="5" fill="#ef4444"/>
  <rect x="325" y="230" width="5" height="5" fill="#ef4444"/>
  <!-- Right panel -->
  <rect x="490" y="60" width="250" height="280" rx="8" fill="rgba(0,0,0,0.2)" stroke="rgba(96,165,250,0.15)" stroke-width="1"/>
  <text x="615" y="92" text-anchor="middle" font-family="monospace" font-size="12" fill="rgba(96,165,250,0.6)" letter-spacing="1">TF SERVING</text>
  <rect x="510" y="100" width="210" height="1" fill="rgba(96,165,250,0.15)"/>
  <!-- Prediction result -->
  <text x="615" y="135" text-anchor="middle" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.4)">Diagnosis</text>
  <text x="615" y="160" text-anchor="middle" font-family="monospace" font-size="17" font-weight="bold" fill="#ef4444">MALIGNANT</text>
  <text x="615" y="180" text-anchor="middle" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.35)">Confidence: 97.3%</text>
  <rect x="510" y="196" width="210" height="1" fill="rgba(96,165,250,0.1)"/>
  <!-- Accuracy metrics -->
  <text x="510" y="220" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.4)">Model Accuracy</text>
  <rect x="510" y="227" width="185" height="6" rx="3" fill="rgba(96,165,250,0.6)"/>
  <text x="720" y="234" text-anchor="end" font-family="monospace" font-size="10" fill="rgba(96,165,250,0.8)">96.1%</text>
  <text x="510" y="256" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.4)">AUC-ROC</text>
  <rect x="510" y="263" width="175" height="6" rx="3" fill="rgba(96,165,250,0.5)"/>
  <text x="720" y="270" text-anchor="end" font-family="monospace" font-size="10" fill="rgba(96,165,250,0.7)">0.989</text>
  <text x="510" y="292" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.4)">Precision</text>
  <rect x="510" y="299" width="165" height="6" rx="3" fill="rgba(96,165,250,0.4)"/>
  <text x="720" y="306" text-anchor="end" font-family="monospace" font-size="10" fill="rgba(96,165,250,0.6)">94.8%</text>
  <text x="400" y="372" text-anchor="middle" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.28)" letter-spacing="3">CANCER DETECTION VIA TF SERVING</text>
</svg>
