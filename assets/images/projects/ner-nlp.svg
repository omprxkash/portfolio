<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c2340"/>
      <stop offset="50%" stop-color="#0369a1"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect width="800" height="400" fill="url(#grid)"/>
  <!-- Text document area -->
  <rect x="80" y="60" width="440" height="280" rx="8" fill="rgba(0,0,0,0.25)" stroke="rgba(56,189,248,0.2)" stroke-width="1.5"/>
  <text x="110" y="92" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.4)">Input text:</text>
  <rect x="80" y="100" width="440" height="1" fill="rgba(56,189,248,0.1)"/>
  <!-- Line 1 with entities -->
  <text x="100" y="130" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.65)">"</text>
  <!-- PERSON entity -->
  <rect x="110" y="116" width="85" height="20" rx="4" fill="rgba(52,211,153,0.15)" stroke="rgba(52,211,153,0.5)" stroke-width="1"/>
  <text x="152" y="130" text-anchor="middle" font-family="monospace" font-size="12" fill="rgba(52,211,153,0.9)">Dr. Ramesh</text>
  <text x="152" y="109" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(52,211,153,0.7)">PERSON</text>
  <text x="200" y="130" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.65)"> from </text>
  <!-- ORG entity -->
  <rect x="248" y="116" width="55" height="20" rx="4" fill="rgba(251,146,60,0.15)" stroke="rgba(251,146,60,0.5)" stroke-width="1"/>
  <text x="275" y="130" text-anchor="middle" font-family="monospace" font-size="12" fill="rgba(251,146,60,0.9)">IIT-M</text>
  <text x="275" y="109" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(251,146,60,0.7)">ORG</text>
  <text x="308" y="130" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.65)"> visited </text>
  <!-- Line 2 -->
  <!-- LOC entity -->
  <rect x="100" y="152" width="68" height="20" rx="4" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.5)" stroke-width="1"/>
  <text x="134" y="166" text-anchor="middle" font-family="monospace" font-size="12" fill="rgba(167,139,250,0.9)">Chennai</text>
  <text x="134" y="145" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(167,139,250,0.7)">LOC</text>
  <text x="173" y="166" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.65)"> on </text>
  <!-- DATE entity -->
  <rect x="196" y="152" width="100" height="20" rx="4" fill="rgba(96,165,250,0.15)" stroke="rgba(96,165,250,0.5)" stroke-width="1"/>
  <text x="246" y="166" text-anchor="middle" font-family="monospace" font-size="12" fill="rgba(96,165,250,0.9)">12 Jan 2025</text>
  <text x="246" y="145" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(96,165,250,0.7)">DATE</text>
  <!-- Line 3 -->
  <text x="100" y="202" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.65)">representing </text>
  <!-- ORG entity 2 -->
  <rect x="208" y="188" width="120" height="20" rx="4" fill="rgba(251,146,60,0.15)" stroke="rgba(251,146,60,0.5)" stroke-width="1"/>
  <text x="268" y="202" text-anchor="middle" font-family="monospace" font-size="12" fill="rgba(251,146,60,0.9)">NLP Research Lab</text>
  <text x="268" y="181" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(251,146,60,0.7)">ORG</text>
  <text x="333" y="202" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.65)">"</text>
  <!-- Legend -->
  <text x="100" y="240" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.3)">Legend:</text>
  <rect x="100" y="248" width="50" height="14" rx="3" fill="rgba(52,211,153,0.15)" stroke="rgba(52,211,153,0.5)" stroke-width="1"/>
  <text x="125" y="259" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(52,211,153,0.8)">PERSON</text>
  <rect x="162" y="248" width="34" height="14" rx="3" fill="rgba(251,146,60,0.15)" stroke="rgba(251,146,60,0.5)" stroke-width="1"/>
  <text x="179" y="259" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(251,146,60,0.8)">ORG</text>
  <rect x="206" y="248" width="30" height="14" rx="3" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.5)" stroke-width="1"/>
  <text x="221" y="259" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(167,139,250,0.8)">LOC</text>
  <rect x="246" y="248" width="36" height="14" rx="3" fill="rgba(96,165,250,0.15)" stroke="rgba(96,165,250,0.5)" stroke-width="1"/>
  <text x="264" y="259" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(96,165,250,0.8)">DATE</text>
  <!-- Stats panel -->
  <rect x="550" y="60" width="200" height="280" rx="8" fill="rgba(0,0,0,0.2)" stroke="rgba(56,189,248,0.15)" stroke-width="1"/>
  <text x="650" y="90" text-anchor="middle" font-family="monospace" font-size="11" fill="rgba(56,189,248,0.6)" letter-spacing="1">NER METRICS</text>
  <rect x="565" y="98" width="170" height="1" fill="rgba(56,189,248,0.1)"/>
  <text x="565" y="120" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.4)">F1 Score</text>
  <rect x="565" y="127" width="158" height="7" rx="3.5" fill="rgba(56,189,248,0.6)"/>
  <text x="735" y="135" text-anchor="end" font-family="monospace" font-size="10" fill="rgba(56,189,248,0.8)">92.4%</text>
  <text x="565" y="158" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.4)">Precision</text>
  <rect x="565" y="165" width="148" height="7" rx="3.5" fill="rgba(56,189,248,0.5)"/>
  <text x="735" y="173" text-anchor="end" font-family="monospace" font-size="10" fill="rgba(56,189,248,0.7)">91.1%</text>
  <text x="565" y="196" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.4)">Recall</text>
  <rect x="565" y="203" width="152" height="7" rx="3.5" fill="rgba(56,189,248,0.45)"/>
  <text x="735" y="211" text-anchor="end" font-family="monospace" font-size="10" fill="rgba(56,189,248,0.65)">93.8%</text>
  <text x="565" y="235" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.4)">Libraries</text>
  <text x="565" y="255" font-family="monospace" font-size="10" fill="rgba(56,189,248,0.7)">spaCy · NLTK · BERT</text>
  <text x="400" y="372" text-anchor="middle" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.28)" letter-spacing="3">NER NLP PIPELINE</text>
</svg>
