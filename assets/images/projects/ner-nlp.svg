<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Arial,sans-serif">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
  </defs>
  <rect width="800" height="400" fill="#f6f6f6"/>
  <rect x="0"   y="0" width="197" height="360" fill="#fdf0e0"/>
  <rect x="201" y="0" width="197" height="360" fill="#e0f0fe"/>
  <rect x="401" y="0" width="197" height="360" fill="#edf8ee"/>
  <rect x="601" y="0" width="199" height="360" fill="#f5e8ff"/>
  <line x1="199" y1="0" x2="199" y2="360" stroke="#ddd" stroke-width="2"/>
  <line x1="399" y1="0" x2="399" y2="360" stroke="#ddd" stroke-width="2"/>
  <line x1="599" y1="0" x2="599" y2="360" stroke="#ddd" stroke-width="2"/>
  <rect x="7" y="7" width="184" height="30" rx="5" fill="#c07020"/>
  <text x="99" y="27" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Raw Text</text>
  <rect x="207" y="7" width="184" height="30" rx="5" fill="#1a72c0"/>
  <text x="299" y="27" text-anchor="middle" fill="white" font-size="12" font-weight="bold">BERT Tokenizer</text>
  <rect x="407" y="7" width="184" height="30" rx="5" fill="#2a9040"/>
  <text x="499" y="27" text-anchor="middle" fill="white" font-size="12" font-weight="bold">NER Model</text>
  <rect x="607" y="7" width="184" height="30" rx="5" fill="#7030b0"/>
  <text x="699" y="27" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Entities</text>
  <!-- Raw text sentences -->
  <rect x="10" y="55" width="178" height="185" rx="5" fill="white" stroke="#ccc"/>
  <text x="18" y="76" fill="#333" font-size="9">"Elon Musk founded Tesla</text>
  <text x="18" y="92" fill="#333" font-size="9"> in Palo Alto in 2003."</text>
  <line x1="10" y1="102" x2="188" y2="102" stroke="#f0e0c0"/>
  <text x="18" y="120" fill="#333" font-size="9">"WHO declared COVID-19</text>
  <text x="18" y="136" fill="#333" font-size="9"> a pandemic in Geneva."</text>
  <line x1="10" y1="146" x2="188" y2="146" stroke="#f0e0c0"/>
  <text x="18" y="164" fill="#333" font-size="9">"Apple Inc. released the</text>
  <text x="18" y="180" fill="#333" font-size="9"> iPhone in California."</text>
  <text x="99" y="220" text-anchor="middle" fill="#888" font-size="9">CoNLL-2003 · OntoNotes</text>
  <!-- BERT token chips -->
  <text x="299" y="58" text-anchor="middle" fill="#1a72c0" font-size="10" font-weight="bold">Subword Tokens</text>
  <rect x="216" y="66" width="38" height="16" rx="4" fill="#1a72c0" opacity="0.2" stroke="#1a72c0" stroke-width="1"/>
  <text x="235" y="78" text-anchor="middle" fill="#1a72c0" font-size="8">[CLS]</text>
  <rect x="258" y="66" width="30" height="16" rx="4" fill="#1a72c0" opacity="0.2" stroke="#1a72c0" stroke-width="1"/>
  <text x="273" y="78" text-anchor="middle" fill="#1a72c0" font-size="8">Elon</text>
  <rect x="292" y="66" width="32" height="16" rx="4" fill="#1a72c0" opacity="0.2" stroke="#1a72c0" stroke-width="1"/>
  <text x="308" y="78" text-anchor="middle" fill="#1a72c0" font-size="8">Musk</text>
  <rect x="328" y="66" width="48" height="16" rx="4" fill="#1a72c0" opacity="0.15" stroke="#1a72c0" stroke-width="0.8"/>
  <text x="352" y="78" text-anchor="middle" fill="#1a72c0" font-size="8">founded</text>
  <rect x="216" y="88" width="38" height="16" rx="4" fill="#d07020" opacity="0.2" stroke="#d07020" stroke-width="1"/>
  <text x="235" y="100" text-anchor="middle" fill="#c07020" font-size="8">Tesla</text>
  <rect x="258" y="88" width="20" height="16" rx="4" fill="#1a72c0" opacity="0.1" stroke="#1a72c0" stroke-width="0.8"/>
  <text x="268" y="100" text-anchor="middle" fill="#1a72c0" font-size="8">in</text>
  <rect x="282" y="88" width="28" height="16" rx="4" fill="#c07020" opacity="0.2" stroke="#c07020" stroke-width="1"/>
  <text x="296" y="100" text-anchor="middle" fill="#c07020" font-size="8">Palo</text>
  <rect x="314" y="88" width="28" height="16" rx="4" fill="#c07020" opacity="0.2" stroke="#c07020" stroke-width="1"/>
  <text x="328" y="100" text-anchor="middle" fill="#c07020" font-size="8">Alto</text>
  <text x="299" y="125" text-anchor="middle" fill="#555" font-size="9">768-dim embeddings</text>
  <rect x="216" y="140" width="168" height="38" rx="5" fill="white" stroke="#1a72c0" stroke-width="1.5"/>
  <text x="300" y="159" text-anchor="middle" fill="#1a72c0" font-size="11" font-weight="bold">BERT-base-NER</text>
  <text x="300" y="173" text-anchor="middle" fill="#777" font-size="9">110M params · fine-tuned</text>
  <!-- NER model tower -->
  <text x="499" y="58" text-anchor="middle" fill="#2a9040" font-size="10" font-weight="bold">BiLSTM-CRF Layers</text>
  <rect x="430" y="65" width="14" height="85" rx="2" fill="#2a9040" opacity="0.9"/>
  <rect x="448" y="72" width="14" height="78" rx="2" fill="#2a9040" opacity="0.9"/>
  <rect x="466" y="80" width="14" height="70" rx="2" fill="#3aaa50" opacity="0.85"/>
  <rect x="484" y="90" width="14" height="60" rx="2" fill="#4aba60" opacity="0.85"/>
  <rect x="502" y="100" width="14" height="50" rx="2" fill="#5aca70" opacity="0.85"/>
  <rect x="520" y="112" width="14" height="38" rx="2" fill="#6ad878" opacity="0.85"/>
  <rect x="538" y="124" width="14" height="26" rx="2" fill="#7ae080" opacity="0.85"/>
  <text x="499" y="175" text-anchor="middle" fill="#555" font-size="9">spaCy · Flair</text>
  <rect x="430" y="198" width="138" height="38" rx="5" fill="white" stroke="#2a9040" stroke-width="1.5"/>
  <text x="499" y="217" text-anchor="middle" fill="#2a9040" font-size="11" font-weight="bold">CRF Decoder</text>
  <text x="499" y="231" text-anchor="middle" fill="#777" font-size="9">BIO tagging scheme</text>
  <!-- Entity tags output -->
  <text x="699" y="62" text-anchor="middle" fill="#7030b0" font-size="10" font-weight="bold">Named Entities</text>
  <rect x="618" y="74" width="48" height="18" rx="9" fill="#1a72c0" opacity="0.85"/>
  <text x="642" y="87" text-anchor="middle" fill="white" font-size="9" font-weight="bold">PER</text>
  <text x="673" y="87" fill="#333" font-size="9">Elon Musk</text>
  <rect x="618" y="99" width="48" height="18" rx="9" fill="#c07020" opacity="0.85"/>
  <text x="642" y="112" text-anchor="middle" fill="white" font-size="9" font-weight="bold">ORG</text>
  <text x="673" y="112" fill="#333" font-size="9">Tesla · Apple</text>
  <rect x="618" y="124" width="48" height="18" rx="9" fill="#2a9040" opacity="0.85"/>
  <text x="642" y="137" text-anchor="middle" fill="white" font-size="9" font-weight="bold">GPE</text>
  <text x="673" y="137" fill="#333" font-size="9">Palo Alto · Geneva</text>
  <rect x="618" y="149" width="48" height="18" rx="9" fill="#7030b0" opacity="0.85"/>
  <text x="642" y="162" text-anchor="middle" fill="white" font-size="9" font-weight="bold">DATE</text>
  <text x="673" y="162" fill="#333" font-size="9">2003</text>
  <line x1="609" y1="178" x2="789" y2="178" stroke="#eee"/>
  <text x="699" y="198" text-anchor="middle" fill="#2a9040" font-size="10" font-weight="bold">F1: 91.3%</text>
  <text x="699" y="216" text-anchor="middle" fill="#666" font-size="9">Precision: 92.1% · Recall: 90.5%</text>
  <line x1="189" y1="145" x2="213" y2="145" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <line x1="389" y1="155" x2="414" y2="155" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <line x1="589" y1="155" x2="614" y2="145" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <rect x="0" y="362" width="800" height="38" fill="#2d3748"/>
  <text x="400" y="386" text-anchor="middle" fill="#ccc" font-size="11">NER with NLP  ·  Python · spaCy · BERT · BiLSTM-CRF · CoNLL-2003 · Flair</text>
</svg>
