<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="50%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect width="800" height="400" fill="url(#grid)"/>
  <!-- Axes -->
  <line x1="120" y1="320" x2="580" y2="320" stroke="rgba(167,139,250,0.3)" stroke-width="1.5"/>
  <line x1="120" y1="320" x2="120" y2="60" stroke="rgba(167,139,250,0.3)" stroke-width="1.5"/>
  <!-- Axis arrows -->
  <polygon points="575,315 585,320 575,325" fill="rgba(167,139,250,0.3)"/>
  <polygon points="115,65 120,55 125,65" fill="rgba(167,139,250,0.3)"/>
  <!-- Axis labels -->
  <text x="590" y="325" font-family="monospace" font-size="11" fill="rgba(167,139,250,0.4)">dim₁</text>
  <text x="100" y="55" font-family="monospace" font-size="11" fill="rgba(167,139,250,0.4)">dim₂</text>
  <!-- Cluster 1: text embeddings (purple) -->
  <circle cx="220" cy="160" r="5" fill="rgba(167,139,250,0.8)"/>
  <circle cx="245" cy="145" r="5" fill="rgba(167,139,250,0.8)"/>
  <circle cx="235" cy="175" r="4" fill="rgba(167,139,250,0.7)"/>
  <circle cx="260" cy="162" r="5" fill="rgba(167,139,250,0.8)"/>
  <circle cx="250" cy="190" r="4" fill="rgba(167,139,250,0.6)"/>
  <circle cx="205" cy="180" r="4" fill="rgba(167,139,250,0.7)"/>
  <circle cx="270" cy="148" r="4" fill="rgba(167,139,250,0.7)"/>
  <!-- Cluster convex hull (text) -->
  <ellipse cx="238" cy="168" rx="48" ry="38" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.2)" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="238" y="222" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(167,139,250,0.6)">Text</text>
  <!-- Cluster 2: image embeddings (teal) -->
  <circle cx="420" cy="220" r="5" fill="rgba(52,211,153,0.8)"/>
  <circle cx="445" cy="200" r="5" fill="rgba(52,211,153,0.8)"/>
  <circle cx="410" cy="245" r="4" fill="rgba(52,211,153,0.7)"/>
  <circle cx="460" cy="225" r="5" fill="rgba(52,211,153,0.8)"/>
  <circle cx="438" cy="250" r="4" fill="rgba(52,211,153,0.6)"/>
  <circle cx="400" cy="215" r="4" fill="rgba(52,211,153,0.7)"/>
  <circle cx="470" cy="210" r="4" fill="rgba(52,211,153,0.7)"/>
  <circle cx="455" cy="260" r="4" fill="rgba(52,211,153,0.6)"/>
  <!-- Cluster convex hull (image) -->
  <ellipse cx="436" cy="230" rx="52" ry="40" fill="rgba(52,211,153,0.06)" stroke="rgba(52,211,153,0.2)" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="436" y="285" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(52,211,153,0.6)">Image</text>
  <!-- Cluster 3: audio embeddings (orange) -->
  <circle cx="300" cy="275" r="5" fill="rgba(251,146,60,0.8)"/>
  <circle cx="325" cy="260" r="5" fill="rgba(251,146,60,0.8)"/>
  <circle cx="290" cy="295" r="4" fill="rgba(251,146,60,0.7)"/>
  <circle cx="345" cy="280" r="5" fill="rgba(251,146,60,0.8)"/>
  <circle cx="315" cy="300" r="4" fill="rgba(251,146,60,0.6)"/>
  <circle cx="335" cy="295" r="4" fill="rgba(251,146,60,0.7)"/>
  <ellipse cx="318" cy="282" rx="45" ry="30" fill="rgba(251,146,60,0.06)" stroke="rgba(251,146,60,0.2)" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="318" y="326" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(251,146,60,0.6)">Audio</text>
  <!-- Dimension reduction label -->
  <rect x="610" y="75" width="155" height="80" rx="8" fill="rgba(0,0,0,0.2)" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
  <text x="687" y="100" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(167,139,250,0.5)">Reduction</text>
  <text x="687" y="118" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#a78bfa">t-SNE</text>
  <text x="687" y="136" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.35)">UMAP · PCA</text>
  <!-- Model info -->
  <rect x="610" y="175" width="155" height="80" rx="8" fill="rgba(0,0,0,0.2)" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
  <text x="687" y="200" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.4)">Models</text>
  <text x="687" y="217" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(167,139,250,0.7)">CLIP · BERT</text>
  <text x="687" y="232" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(167,139,250,0.6)">Whisper · DALL-E</text>
  <text x="400" y="372" text-anchor="middle" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.28)" letter-spacing="3">MULTIMODEL EMBEDDINGS</text>
</svg>
