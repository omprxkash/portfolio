<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Arial,sans-serif">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#555"/>
    </marker>
  </defs>
  <rect width="800" height="400" fill="#f6f6f6"/>
  <rect x="0"   y="0" width="197" height="360" fill="#fde8f0"/>
  <rect x="201" y="0" width="197" height="360" fill="#e8f4ff"/>
  <rect x="401" y="0" width="197" height="360" fill="#e8fff0"/>
  <rect x="601" y="0" width="199" height="360" fill="#fffae0"/>
  <line x1="199" y1="0" x2="199" y2="360" stroke="#ddd" stroke-width="2"/>
  <line x1="399" y1="0" x2="399" y2="360" stroke="#ddd" stroke-width="2"/>
  <line x1="599" y1="0" x2="599" y2="360" stroke="#ddd" stroke-width="2"/>
  <rect x="7" y="7" width="184" height="30" rx="5" fill="#c03060"/>
  <text x="99" y="27" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Multimodal Inputs</text>
  <rect x="207" y="7" width="184" height="30" rx="5" fill="#2060c0"/>
  <text x="299" y="27" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Encoders</text>
  <rect x="407" y="7" width="184" height="30" rx="5" fill="#209060"/>
  <text x="499" y="27" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Fusion</text>
  <rect x="607" y="7" width="184" height="30" rx="5" fill="#c08000"/>
  <text x="699" y="27" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Embedding Space</text>
  <!-- Multimodal inputs -->
  <rect x="18" y="58" width="60" height="48" rx="4" fill="#ffd0e0" stroke="#c03060" stroke-width="1.5"/>
  <text x="48" y="80" text-anchor="middle" fill="#c03060" font-size="20">🖼</text>
  <text x="48" y="100" text-anchor="middle" fill="#c03060" font-size="9" font-weight="bold">Image</text>
  <rect x="18" y="118" width="60" height="48" rx="4" fill="#d0e8ff" stroke="#2060c0" stroke-width="1.5"/>
  <text x="48" y="140" text-anchor="middle" fill="#2060c0" font-size="20">📝</text>
  <text x="48" y="160" text-anchor="middle" fill="#2060c0" font-size="9" font-weight="bold">Text</text>
  <rect x="18" y="178" width="60" height="48" rx="4" fill="#d0f0e0" stroke="#209060" stroke-width="1.5"/>
  <text x="48" y="200" text-anchor="middle" fill="#209060" font-size="20">🎵</text>
  <text x="48" y="220" text-anchor="middle" fill="#209060" font-size="9" font-weight="bold">Audio</text>
  <text x="99" y="270" text-anchor="middle" fill="#888" font-size="9">COCO · CC3M · AudioSet</text>
  <!-- Encoders: 3 separate towers -->
  <text x="235" y="58" text-anchor="middle" fill="#c03060" font-size="9" font-weight="bold">ViT</text>
  <rect x="218" y="65" width="10" height="75" rx="1" fill="#c03060" opacity="0.85"/>
  <rect x="231" y="72" width="10" height="68" rx="1" fill="#d04070" opacity="0.85"/>
  <rect x="244" y="80" width="10" height="60" rx="1" fill="#e05080" opacity="0.85"/>
  <rect x="257" y="90" width="10" height="50" rx="1" fill="#e86090" opacity="0.85"/>
  <text x="280" y="58" text-anchor="middle" fill="#2060c0" font-size="9" font-weight="bold">BERT</text>
  <rect x="265" y="65" width="10" height="80" rx="1" fill="#2060c0" opacity="0.85"/>
  <rect x="278" y="70" width="10" height="75" rx="1" fill="#3070d0" opacity="0.85"/>
  <rect x="291" y="78" width="10" height="67" rx="1" fill="#4080e0" opacity="0.85"/>
  <rect x="304" y="88" width="10" height="57" rx="1" fill="#5090e8" opacity="0.85"/>
  <text x="340" y="58" text-anchor="middle" fill="#209060" font-size="9" font-weight="bold">AST</text>
  <rect x="323" y="65" width="10" height="70" rx="1" fill="#209060" opacity="0.85"/>
  <rect x="336" y="73" width="10" height="62" rx="1" fill="#30a070" opacity="0.85"/>
  <rect x="349" y="82" width="10" height="53" rx="1" fill="#40b080" opacity="0.85"/>
  <rect x="362" y="92" width="10" height="43" rx="1" fill="#50c090" opacity="0.85"/>
  <text x="299" y="165" text-anchor="middle" fill="#555" font-size="9">512-dim per modality</text>
  <rect x="216" y="182" width="168" height="38" rx="5" fill="white" stroke="#2060c0" stroke-width="1.5"/>
  <text x="300" y="201" text-anchor="middle" fill="#2060c0" font-size="11" font-weight="bold">Projection Heads</text>
  <text x="300" y="215" text-anchor="middle" fill="#777" font-size="9">→ shared 256-dim space</text>
  <!-- Fusion -->
  <text x="499" y="58" text-anchor="middle" fill="#209060" font-size="10" font-weight="bold">Cross-Modal Fusion</text>
  <rect x="416" y="66" width="168" height="40" rx="5" fill="white" stroke="#209060" stroke-width="1.5"/>
  <text x="500" y="85" text-anchor="middle" fill="#209060" font-size="10" font-weight="bold">Attention Fusion</text>
  <text x="500" y="100" text-anchor="middle" fill="#777" font-size="9">Q/K/V cross-modal</text>
  <line x1="500" y1="109" x2="500" y2="133" stroke="#888" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="416" y="137" width="168" height="40" rx="5" fill="white" stroke="#aaa"/>
  <text x="500" y="157" text-anchor="middle" fill="#333" font-size="10" font-weight="bold">CLIP-style Contrastive</text>
  <text x="500" y="171" text-anchor="middle" fill="#777" font-size="9">InfoNCE · temperature τ</text>
  <line x1="500" y1="181" x2="500" y2="205" stroke="#888" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="416" y="209" width="168" height="38" rx="5" fill="white" stroke="#aaa"/>
  <text x="500" y="228" text-anchor="middle" fill="#333" font-size="10" font-weight="bold">Joint Embedding</text>
  <text x="500" y="242" text-anchor="middle" fill="#777" font-size="9">256-d unified space</text>
  <!-- Embedding scatter plot -->
  <text x="699" y="62" text-anchor="middle" fill="#c08000" font-size="10" font-weight="bold">2D Projection (t-SNE)</text>
  <rect x="616" y="70" width="165" height="130" rx="4" fill="white" stroke="#ccc"/>
  <!-- Image cluster -->
  <circle cx="650" cy="110" r="5" fill="#c03060" opacity="0.8"/>
  <circle cx="663" cy="103" r="5" fill="#c03060" opacity="0.8"/>
  <circle cx="658" cy="122" r="5" fill="#c03060" opacity="0.8"/>
  <circle cx="672" cy="115" r="5" fill="#c03060" opacity="0.8"/>
  <!-- Text cluster -->
  <circle cx="720" cy="105" r="5" fill="#2060c0" opacity="0.8"/>
  <circle cx="733" cy="112" r="5" fill="#2060c0" opacity="0.8"/>
  <circle cx="728" cy="96" r="5" fill="#2060c0" opacity="0.8"/>
  <circle cx="740" cy="122" r="5" fill="#2060c0" opacity="0.8"/>
  <!-- Audio cluster -->
  <circle cx="685" cy="155" r="5" fill="#209060" opacity="0.8"/>
  <circle cx="698" cy="148" r="5" fill="#209060" opacity="0.8"/>
  <circle cx="710" cy="160" r="5" fill="#209060" opacity="0.8"/>
  <circle cx="700" cy="165" r="5" fill="#209060" opacity="0.8"/>
  <line x1="616" y1="213" x2="781" y2="213" stroke="#eee"/>
  <text x="699" y="230" text-anchor="middle" fill="#c08000" font-size="9" font-weight="bold">R@1: 76.3%  R@5: 91.2%</text>
  <text x="699" y="246" text-anchor="middle" fill="#666" font-size="9">Zero-shot retrieval</text>
  <line x1="189" y1="155" x2="213" y2="155" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <line x1="389" y1="155" x2="414" y2="155" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <line x1="589" y1="155" x2="614" y2="155" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <rect x="0" y="362" width="800" height="38" fill="#2d3748"/>
  <text x="400" y="386" text-anchor="middle" fill="#ccc" font-size="11">Multimodal Embeddings  ·  PyTorch · CLIP · ViT · BERT · AST · Cross-Modal Fusion</text>
</svg>
