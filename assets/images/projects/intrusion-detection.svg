<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="50%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect width="800" height="400" fill="url(#grid)"/>
  <!-- Network connections -->
  <!-- Center hub -->
  <line x1="400" y1="200" x2="200" y2="120" stroke="rgba(52,211,153,0.2)" stroke-width="1.5"/>
  <line x1="400" y1="200" x2="200" y2="280" stroke="rgba(52,211,153,0.2)" stroke-width="1.5"/>
  <line x1="400" y1="200" x2="600" y2="120" stroke="rgba(52,211,153,0.2)" stroke-width="1.5"/>
  <line x1="400" y1="200" x2="600" y2="280" stroke="rgba(52,211,153,0.2)" stroke-width="1.5"/>
  <line x1="400" y1="200" x2="130" y2="200" stroke="rgba(52,211,153,0.2)" stroke-width="1.5"/>
  <line x1="400" y1="200" x2="670" y2="200" stroke="rgba(52,211,153,0.2)" stroke-width="1.5"/>
  <line x1="400" y1="200" x2="400" y2="85" stroke="rgba(52,211,153,0.2)" stroke-width="1.5"/>
  <line x1="400" y1="200" x2="400" y2="315" stroke="rgba(52,211,153,0.2)" stroke-width="1.5"/>
  <!-- Cross connections -->
  <line x1="200" y1="120" x2="130" y2="200" stroke="rgba(52,211,153,0.1)" stroke-width="1"/>
  <line x1="200" y1="280" x2="130" y2="200" stroke="rgba(52,211,153,0.1)" stroke-width="1"/>
  <line x1="600" y1="120" x2="670" y2="200" stroke="rgba(52,211,153,0.1)" stroke-width="1"/>
  <line x1="600" y1="280" x2="670" y2="200" stroke="rgba(52,211,153,0.1)" stroke-width="1"/>
  <!-- Alert connection (red) -->
  <line x1="200" y1="120" x2="600" y2="280" stroke="rgba(239,68,68,0.4)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Normal nodes -->
  <circle cx="200" cy="120" r="18" fill="rgba(52,211,153,0.12)" stroke="#34d399" stroke-width="2"/>
  <circle cx="200" cy="280" r="18" fill="rgba(52,211,153,0.12)" stroke="#34d399" stroke-width="2"/>
  <circle cx="600" cy="120" r="18" fill="rgba(52,211,153,0.12)" stroke="#34d399" stroke-width="2"/>
  <circle cx="130" cy="200" r="18" fill="rgba(52,211,153,0.12)" stroke="#34d399" stroke-width="2"/>
  <circle cx="670" cy="200" r="18" fill="rgba(52,211,153,0.12)" stroke="#34d399" stroke-width="2"/>
  <circle cx="400" cy="85" r="18" fill="rgba(52,211,153,0.12)" stroke="#34d399" stroke-width="2"/>
  <circle cx="400" cy="315" r="18" fill="rgba(52,211,153,0.12)" stroke="#34d399" stroke-width="2"/>
  <!-- Malicious node (red) -->
  <circle cx="600" cy="280" r="22" fill="rgba(239,68,68,0.15)" stroke="#ef4444" stroke-width="2.5"/>
  <text x="600" y="285" text-anchor="middle" font-family="monospace" font-size="14" fill="#ef4444">!</text>
  <!-- Center hub -->
  <circle cx="400" cy="200" r="28" fill="rgba(52,211,153,0.1)" stroke="#34d399" stroke-width="2.5"/>
  <text x="400" y="196" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(52,211,153,0.7)">ROUTER</text>
  <text x="400" y="208" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(52,211,153,0.5)">HUB</text>
  <!-- Alert panel -->
  <rect x="540" y="55" width="215" height="75" rx="6" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.3)" stroke-width="1.5"/>
  <text x="647" y="80" text-anchor="middle" font-family="monospace" font-size="11" fill="#ef4444" letter-spacing="1">⚠ INTRUSION DETECTED</text>
  <text x="647" y="98" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.4)">Source: 192.168.1.47</text>
  <text x="647" y="115" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.4)">Attack: Port Scan / DoS</text>
  <!-- Model badge -->
  <rect x="45" y="55" width="180" height="60" rx="6" fill="rgba(52,211,153,0.07)" stroke="rgba(52,211,153,0.2)" stroke-width="1"/>
  <text x="135" y="78" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(52,211,153,0.6)">Random Forest</text>
  <text x="135" y="95" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#34d399">99.1%</text>
  <text x="135" y="108" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.3)">Accuracy</text>
  <text x="400" y="372" text-anchor="middle" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.28)" letter-spacing="3">INTRUSION DETECTION SYSTEM</text>
</svg>
