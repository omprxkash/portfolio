<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2e1065"/>
      <stop offset="50%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect width="800" height="400" fill="url(#grid)"/>
  <!-- Network connections (social graph) -->
  <line x1="400" y1="200" x2="280" y2="140" stroke="rgba(167,139,250,0.3)" stroke-width="1.5"/>
  <line x1="400" y1="200" x2="520" y2="140" stroke="rgba(167,139,250,0.3)" stroke-width="1.5"/>
  <line x1="400" y1="200" x2="250" y2="240" stroke="rgba(167,139,250,0.3)" stroke-width="1.5"/>
  <line x1="400" y1="200" x2="550" y2="260" stroke="rgba(167,139,250,0.3)" stroke-width="1.5"/>
  <line x1="400" y1="200" x2="380" y2="300" stroke="rgba(167,139,250,0.3)" stroke-width="1.5"/>
  <line x1="400" y1="200" x2="160" y2="180" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
  <line x1="400" y1="200" x2="640" y2="200" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
  <line x1="280" y1="140" x2="520" y2="140" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
  <line x1="280" y1="140" x2="160" y2="180" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
  <line x1="520" y1="140" x2="640" y2="200" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
  <line x1="250" y1="240" x2="160" y2="180" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
  <line x1="550" y1="260" x2="640" y2="200" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
  <line x1="380" y1="300" x2="250" y2="240" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
  <line x1="380" y1="300" x2="550" y2="260" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
  <!-- Secondary nodes -->
  <line x1="280" y1="140" x2="200" y2="90" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
  <line x1="520" y1="140" x2="600" y2="90" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
  <line x1="160" y1="180" x2="100" y2="140" stroke="rgba(167,139,250,0.1)" stroke-width="1"/>
  <line x1="640" y1="200" x2="700" y2="160" stroke="rgba(167,139,250,0.1)" stroke-width="1"/>
  <!-- Leaf nodes -->
  <circle cx="200" cy="90" r="8" fill="rgba(167,139,250,0.2)" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
  <circle cx="600" cy="90" r="8" fill="rgba(167,139,250,0.2)" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
  <circle cx="100" cy="140" r="8" fill="rgba(167,139,250,0.2)" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
  <circle cx="700" cy="160" r="8" fill="rgba(167,139,250,0.2)" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
  <circle cx="100" cy="300" r="8" fill="rgba(167,139,250,0.2)" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
  <circle cx="700" cy="300" r="8" fill="rgba(167,139,250,0.2)" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
  <line x1="160" y1="180" x2="100" y2="300" stroke="rgba(167,139,250,0.1)" stroke-width="1"/>
  <line x1="640" y1="200" x2="700" y2="300" stroke="rgba(167,139,250,0.1)" stroke-width="1"/>
  <!-- Main nodes (colored by cluster) -->
  <circle cx="280" cy="140" r="18" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="2"/>
  <circle cx="520" cy="140" r="18" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="2"/>
  <circle cx="250" cy="240" r="16" fill="rgba(167,139,250,0.12)" stroke="#a78bfa" stroke-width="1.5"/>
  <circle cx="550" cy="260" r="16" fill="rgba(167,139,250,0.12)" stroke="#a78bfa" stroke-width="1.5"/>
  <circle cx="380" cy="300" r="14" fill="rgba(167,139,250,0.12)" stroke="#a78bfa" stroke-width="1.5"/>
  <circle cx="160" cy="180" r="14" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.4)" stroke-width="1.5"/>
  <circle cx="640" cy="200" r="14" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.4)" stroke-width="1.5"/>
  <!-- Central hub -->
  <circle cx="400" cy="200" r="32" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="2.5"/>
  <text x="400" y="196" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(167,139,250,0.8)">COSMOS</text>
  <text x="400" y="210" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.4)">AI Engine</text>
  <!-- Label -->
  <rect x="560" y="300" width="190" height="55" rx="6" fill="rgba(0,0,0,0.2)" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
  <text x="655" y="322" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(167,139,250,0.6)">Neural Recommendations</text>
  <text x="655" y="342" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#a78bfa">B2B SaaS</text>
  <text x="400" y="372" text-anchor="middle" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.28)" letter-spacing="3">COSMOSAID PLATFORM</text>
</svg>
